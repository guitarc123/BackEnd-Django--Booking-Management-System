<!DOCTYPE html>
<html>
<head>

<title>Create Booking</title>

<style>

body{
font-family:Arial;
background:#f4f4f4;
text-align:center;
}

.container{
width:400px;
margin:auto;
margin-top:60px;
background:white;
padding:30px;
border-radius:8px;
box-shadow:0px 0px 10px #ccc;
}

input,select{
width:100%;
padding:10px;
margin:10px 0;
}

button{
background:#28a745;
color:white;
padding:12px;
border:none;
width:100%;
font-size:16px;
}

button:hover{
background:#218838;
}

</style>

</head>

<body>

<div class="container">

<h2>Create a Booking</h2>

<form method="POST">

{% csrf_token %}

{{ form.as_p }}

<button type="submit">Book Now</button>

</form>

</div>

</body>
</html>
